name: Build site from metadata

on:
  push:
    branches: [main]
    paths:
      - metadata.yaml        # only runs when metadata changes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit data.js back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build data.js from metadata.yaml
        run: node build.js

      - name: Commit updated data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js
          git diff --cached --quiet || git commit -m "chore: rebuild data.js from metadata.yaml [skip ci]"
          git push
